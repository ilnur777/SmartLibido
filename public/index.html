<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartLibido MVP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #FFF9F7;
            color: #241F2E;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #7B4DFF; }
        .card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(123, 77, 255, 0.1);
            width: 80%;
            max-width: 400px;
        }
        .status {
            margin-top: 20px;
            font-size: 0.9em;
            color: #7A7285;
        }
        button {
            background: #7B4DFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1em;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SmartLibido</h1>
        <p>Привет, Ильнур!</p>
        <p>Я <b>Кимико</b>, твой ИИ-стратег. Мы начали разработку MVP прямо на твоем домашнем ноуте.</p>
        <div id="user-info" class="status"></div>
        <button onclick="Telegram.WebApp.close()">Понял, работаю дальше</button>
    </div>

    <script>
        // Инициализация Telegram Mini App
        const webapp = window.Telegram.WebApp;
        webapp.expand();
        webapp.ready();

        const user = webapp.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-info').innerText = `Авторизован как: ${user.first_name} ${user.last_name || ''}`;
        }
    </script>
</body>
</html>
