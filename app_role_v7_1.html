<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartLibido v0.7.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #FFF9F7; --surface: #FFFFFF; --primary: #7B4DFF; --text-main: #241F2E; --text-sec: #7A7285; --border: #EEE7F1; --accent: #FF8BA7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--surface); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(123,77,255,0.05); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-sec { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .partner-hint { background: #f0f7ff; border-left: 4px solid #0088cc; padding: 15px; text-align: left; border-radius: 12px; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="role-owner" class="hidden" style="width:100%; max-width:400px;">
        <div class="card">
            <h1>SmartLibido</h1>
            <p>Личный кабинет Хозяйки</p>
            <button class="nav-btn" onclick="showOwnerScreen('owner-sharing')">💞 Партнерство</button>
            <button class="nav-btn btn-sec">📅 Календарь</button>
        </div>
        <div id="owner-sharing" class="card hidden">
            <button class="nav-btn btn-sec" onclick="showOwnerScreen('role-owner')">← Назад</button>
            <h2>Инвайт</h2>
            <button class="nav-btn" onclick="copyInvite()">Копировать ссылку для МУЖА</button>
        </div>
    </div>

    <div id="role-partner" class="hidden" style="width:100%; max-width:400px;">
        <div class="card">
            <h1>SmartLibido Partner</h1>
            <div style="font-size:48px; margin:15px 0;">🌤</div>
            <div style="font-weight:bold; color:var(--primary); font-size:18px;">Режим заботы</div>
            <div class="partner-hint">Вы зашли как партнер. Здесь будут подсказки, как поддержать вашу половинку.</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function initApp() {
            // ПРОВЕРКА: Если в хеше или в адресе есть слово 'invite' - это партнер
            const fullUrl = window.location.href;
            if (fullUrl.includes('invite') || fullUrl.includes('start')) {
                document.getElementById('role-partner').classList.remove('hidden');
            } else {
                document.getElementById('role-owner').classList.remove('hidden');
            }
        }

        function showOwnerScreen(id) {
            document.getElementById('role-owner').classList.add('hidden');
            document.getElementById('owner-sharing').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function copyInvite() {
            // Генерируем ПРЯМУЮ ссылку на этот же файл, но с хвостом #invite
            const myUrl = window.location.href.split('#')[0].split('?')[0];
            const inviteUrl = myUrl + '#invite'; 
            
            navigator.clipboard.writeText(inviteUrl).then(() => {
                tg.showPopup({
                    title: 'Ссылка готова!',
                    message: 'Скинь её самому себе (или на второй акк) и просто КЛИКНИ по ней.',
                    buttons: [{type: 'ok'}]
                });
            });
        }

        initApp();
    </script>
</body>
</html>
